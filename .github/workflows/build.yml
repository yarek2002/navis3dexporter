name: Build Navis3dExporter

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Navis3dExporter.csproj

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,)'  # VS 2022.

      - name: Build Release
        run: msbuild Navis3dExporter.csproj /p:Configuration=Release /p:Platform=x64

      - name: Publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: Navis3dExporter-bin
          path: |
            **/bin/Release/**